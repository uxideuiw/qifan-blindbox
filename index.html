${info.amount.toFixed(2)}`;$('pay-discount').textContent=info.useCoupon?`已使用优惠券抵扣 ¥${info.discount.toFixed(2)}`:'暂无可用优惠券';$('qrcode-img').style.display='block';$('qrcode-placeholder').style.display='none';$('qrcode-img').src='./qrcode.png';$('payment-modal').style.display='flex'}function closePaymentModal(){$('payment-modal').style.display='none'}function createOrderAfterPayment(){if(!currentBlindBox){showHomePage();renderBlindBoxes();return}let dorm=$('dorm-input').value.trim();if(!dorm){showToast('请填写宿舍楼');closePaymentModal();return}let info=calculatePayInfo(),orders=getOrders();if(info.useCoupon){let cs=JSON.parse(localStorage.qifanCoupons||'[]');cs.shift();localStorage.qifanCoupons=JSON.stringify(cs)}orders.unshift({orderNo:`QF${Date.now()}${Math.floor(Math.random()*9000+1000)}`,boxId:currentBlindBox.id,title:currentBlindBox.title,pickupTime:selectedPickupTime,dorm,status:'待取餐',openResult:'',paidAmount:info.amount.toFixed(2)});saveOrders(orders);showToast('支付成功，订单已生成');closePaymentModal();showOrdersPage()}function placeOrder(){if(!currentBlindBox){showHomePage();renderBlindBoxes();return}if(!$('dorm-input').value.trim()){showToast('请填写宿舍楼');return}showPaymentModal()}function drawGoods(box){let count=box.drawMin===box.drawMax?box.drawMin:Math.floor(Math.random()*(box.drawMax-box.drawMin+1))+box.drawMin,pool=[...box.goodsPool],result=[];while(result.length<count&&pool.length){let idx=Math.floor(Math.random()*pool.length);result.push(pool.splice(idx,1)[0])}return result}function openBox(no){let orders=getOrders(),o=orders.find(x=>x.orderNo===no),b=blindBoxes.find(x=>x.id===o.boxId)||blindBoxes.find(x=>x.title===o.title),goods=drawGoods(b);o.status='已开盒';o.openResult=goods.map(g=>g.name).join(' + ');o.openGoods=goods;saveOrders(orders);renderOrders();showOpenBoxModal(goods)}function showOpenBoxModal(goods){let html=`<div class="space-y-3 text-left">${goods.map(g=>`<div class="flex items-center gap-3 rounded-2xl bg-teal-50 p-3 text-base font-black text-slate-800"><div class="flex h-[60px] w-[60px] shrink-0 items-center justify-center overflow-hidden rounded-2xl bg-white text-2xl"><img class="h-full w-full object-cover" src="${g.imagePath}" alt="${g.name}" width="60" height="60" loading="lazy" decoding="async" onerror="handleImgError(this)"><span class="hidden h-full w-full items-center justify-center bg-slate-200 px-1 text-center text-[10px] font-bold text-slate-500">图片加载中</span></div><span>${g.name}</span></div>`).join('')}</div>`;showModal('开盒成功',html)}function closeOpenBoxModal(){$('open-box-modal').style.display='none'}function renderOpenGoods(goods,result){if(goods&&goods.length)return `<div class="mt-4 space-y-2 rounded-3xl bg-green-50 p-3">${goods.map(g=>`<div class="flex items-center gap-3 text-sm font-bold text-green-700"><div class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-xl bg-white text-lg"><img class="h-full w-full object-cover" src="${g.imagePath}" alt="${g.name}" width="40" height="40" loading="lazy" decoding="async" onerror="handleImgError(this)"><span class="hidden h-full w-full items-center justify-center bg-slate-200 px-1 text-center text-[10px] font-bold text-slate-500">图片加载中</span></div><span>${g.name}</span></div>`).join('')}</div>`;return result?`<div class="mt-4 rounded-3xl bg-green-50 p-4 text-sm font-bold text-green-700">开盒结果：${result}</div>`:''}function renderOrders(){let orders=getOrders();$('orders-list').innerHTML=orders.length?orders.map(o=>`<article class="rounded-[2rem] bg-white p-5 shadow-xl shadow-slate-200/70"><div class="flex items-start justify-between gap-3"><div><h2 class="text-lg font-black">${o.title}</h2><p class="mt-2 text-sm text-slate-500">配送时间：${o.pickupTime}</p><p class="mt-1 text-sm text-slate-500">宿舍楼：${o.dorm||'未填写'}</p></div><span class="shrink-0 rounded-full ${o.status==='待取餐'?'bg-teal-50 text-teal-500':'bg-green-50 text-green-600'} px-3 py-1 text-xs font-black">${o.status}</span></div>${renderOpenGoods(o.openGoods,o.openResult)}<div class="mt-4 grid ${o.status==='待取餐'?'grid-cols-2':'grid-cols-1'} gap-3">${o.status==='待取餐'?`<button class="rounded-2xl bg-cyan-500 py-3 text-sm font-black text-white" onclick="openBox('${o.orderNo}')" type="button">开盒</button>`:''}<button class="rounded-2xl bg-slate-200 py-3 text-sm font-black text-slate-600" onclick="confirmCancelOrder('${o.orderNo}')" type="button">取消</button></div></article>`).join(''):`<div class="mt-20 rounded-[2rem] bg-white p-8 text-center shadow-xl shadow-slate-200/70"><div class="text-5xl">订单</div><p class="mt-4 text-lg font-black">暂无订单</p><p class="mt-2 text-sm text-slate-500">去首页抢一个山姆代购盲盒吧</p></div>`}function showOrdersPage(){renderOrders();hideAllPages();$('orders-page').style.display='block';$('bottom-tab').style.display='block';updateTabs('orders')}function cancelOrder(no){let orders=getOrders().filter(o=>o.orderNo!==no);saveOrders(orders);showToast('订单已取消');renderOrders()}function confirmCancelOrder(no){showConfirmModal('取消订单','<div class="rounded-2xl bg-cyan-50 p-5 text-sm font-bold leading-6 text-slate-700">确定要取消此订单吗？删除后不可恢复。</div>',()=>cancelOrder(no))}function getMockUser(){return JSON.parse(localStorage.qifanMockUser||'null')}function saveMockUser(user){localStorage.qifanMockUser=JSON.stringify(user)}function renderUserInfo(){let user=getMockUser(),avatar=$('user-avatar'),nick=$('user-nickname'),btn=$('wechat-login-btn');if(!avatar||!nick||!btn)return;if(user){nick.textContent=user.nickname;avatar.innerHTML=user.avatarHtml||'微';btn.textContent='已登录（模拟）';btn.className='mb-4 w-full rounded-2xl bg-slate-200 py-3 text-sm font-black text-slate-500';}else{nick.textContent='QI饭同学';avatar.textContent='我';btn.textContent='微信登录（模拟）';btn.className='mb-4 w-full rounded-2xl bg-teal-500 py-3 text-sm font-black text-white shadow-lg shadow-teal-200';}}function handleWechatLoginClick(){if(getMockUser()){showToast('已登录');return}showConfirmModal('微信登录（模拟）','<div class="rounded-2xl bg-cyan-50 p-5 text-sm font-bold leading-6 text-slate-700">由于学生项目无法接入真实微信登录，此处为模拟登录。点击确认后将自动填充登录信息。</div>',mockWechatLogin)}function mockWechatLogin(){let names=['山姆干饭人','盲盒小能手','零食探险家'],nickname=names[Math.floor(Math.random()*names.length)];saveMockUser({nickname,avatarHtml:'<div class="flex h-full w-full items-center justify-center bg-teal-500 text-base font-black text-white">微信</div>'});renderUserInfo();showToast('登录成功（模拟）')}function renderMine(){initStore();$('invite-count').textContent=localStorage.qifanInviteCount;$('coupon-count').textContent=JSON.parse(localStorage.qifanCoupons).length;renderUserInfo()}function showMinePage(){renderMine();hideAllPages();$('mine-page').style.display='block';$('bottom-tab').style.display='block';updateTabs('mine')}function copyInviteText(){copyText('快来 QI饭 吃盲盒！邀请码 QI2024','已复制邀请链接')}function copyInviteCode(){copyText('QI2024','邀请码已复制')}function claimCoupon(){let cs=JSON.parse(localStorage.qifanCoupons||'[]');cs.push({name:'满 5 减 5',time:Date.now()});localStorage.qifanCoupons=JSON.stringify(cs);renderMine();showToast('已领取满5减5优惠券')}initStore();renderBlindBoxes();startCarousels();</script><div id="global-toast" style="display:none"></div><div id="global-modal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/55 px-5 backdrop-blur-sm modal-fade"><div class="modal-card w-full max-w-sm rounded-[2rem] bg-white p-6 text-center shadow-2xl"><h2 id="global-modal-title" class="text-2xl font-black text-slate-900"></h2><div id="global-modal-content" class="mt-5"></div><div id="global-modal-actions" class="mt-6"><button class="w-full rounded-2xl bg-slate-900 py-3 text-base font-black text-white shadow-lg shadow-slate-300 active:scale-[.98]" type="button" onclick="closeGlobalModal()">太棒了</button></div></div></div><div id="payment-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/55 px-5 backdrop-blur-sm modal-fade"><div class="modal-card w-full max-w-sm rounded-[2rem] bg-white p-6 text-center shadow-2xl"><h2 class="text-2xl font-black text-slate-900">请扫码支付</h2><p class="mt-3 text-sm text-slate-500">实付金额</p><p id="pay-amount" class="mt-1 text-4xl font-black text-cyan-600">¥0.00</p><p id="pay-discount" class="mt-2 text-xs font-bold text-teal-500"></p><div class="mx-auto mt-5 flex h-56 w-56 items-center justify-center overflow-hidden rounded-3xl bg-slate-100"><img id="qrcode-img" class="h-full w-full object-cover" src="./qrcode.png" alt="收款二维码" onerror="this.style.display='none';document.getElementById('qrcode-placeholder').style.display='flex'"><div id="qrcode-placeholder" class="hidden h-full w-full items-center justify-center px-5 text-center text-sm font-bold leading-6 text-slate-400">请将收款码图片命名为 qrcode.png 并放在同目录</div></div><p class="mt-4 text-sm font-bold text-slate-500">微信 / 支付宝 扫码支付</p><div class="mt-6 grid grid-cols-2 gap-3"><button class="rounded-2xl bg-slate-200 py-3 text-sm font-black text-slate-600" type="button" onclick="closePaymentModal()">取消</button><button class="rounded-2xl bg-green-500 py-3 text-sm font-black text-white shadow-lg shadow-green-200" type="button" onclick="createOrderAfterPayment()">我已支付</button></div></div></div><div id="open-box-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/55 px-5 backdrop-blur-sm modal-fade"><div class="modal-card w-full max-w-sm rounded-[2rem] bg-white p-6 text-center shadow-2xl"><h2 class="mt-3 text-2xl font-black text-slate-900">开盒成功</h2><div id="modal-food-list" class="mt-5 space-y-3 text-left"></div><button class="mt-6 w-full rounded-2xl bg-cyan-500 py-3 text-base font-black text-white shadow-lg shadow-teal-200 active:scale-[.98]" type="button" onclick="closeOpenBoxModal()">太棒了</button></div></div></body></html>
